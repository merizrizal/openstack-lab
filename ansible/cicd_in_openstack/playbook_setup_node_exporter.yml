---
- name: Deploy Prometheus node exporter to all CI/CD VMs
  hosts: gitlab*, jenkins*, runner*
  become: true
  vars:
    root_dir: "{{ lookup('ansible.builtin.env', 'ROOT_DIR') | default(playbook_dir | dirname | dirname, true) }}"
  tasks:
    - name: Call telemetry node_exporter role
      ansible.builtin.include_role:
        name: telemetry
        tasks_from: node_exporter
