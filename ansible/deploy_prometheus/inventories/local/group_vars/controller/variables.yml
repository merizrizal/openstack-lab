---
mysqld_exporter_download_url: https://github.com/prometheus/mysqld_exporter/releases/download
mysqld_exporter_version: 0.18.0
mysqld_exporter_home: /opt/mysqld_exporter

openstack_exporter_download_url: https://github.com/openstack-exporter/openstack-exporter/releases/download
openstack_exporter_version: 1.8.0-alpha
openstack_exporter_home: /opt/openstack_exporter

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - "{{ controller01.mgmtnet_ip_address }}:{{ prometheus_port }}"

  - job_name: nodes
    static_configs:
      - targets:
          - "{{ controller01.mgmtnet_ip_address }}:{{ node_exporter_port }}"
          - "{{ compute01.mgmtnet_ip_address }}:{{ node_exporter_port }}"
          - "{{ compute02.mgmtnet_ip_address }}:{{ node_exporter_port }}"
          - "{{ storage01.mgmtnet_ip_address }}:{{ node_exporter_port }}"
          - "{{ ceph01.mgmtnet_ip_address }}:{{ node_exporter_port }}"

  - job_name: rabbitmq
    static_configs:
      - targets:
          - "{{ controller01.mgmtnet_ip_address }}:15692"

  - job_name: mysql
    static_configs:
      - targets:
          - "{{ controller01.mgmtnet_ip_address }}:9104"

  - job_name: openstack
    scrape_interval: 60s
    static_configs:
      - targets:
          - "{{ controller01.mgmtnet_ip_address }}:9180"

opensearch_api_port: 9920
opensearch_version: 3.4.0
