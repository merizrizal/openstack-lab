---
- name: Install OpenSearch plugin for Grafana
  ansible.builtin.command:
    cmd: grafana-cli plugins install grafana-opensearch-datasource
  register: grafana_opensearch_plugin
  changed_when: grafana_opensearch_plugin.stdout is defined and 'already installed' not in (grafana_opensearch_plugin.stdout | lower)

- name: Provision OpenSearch datasource
  ansible.builtin.include_role:
    name: telemetry
    tasks_from: grafana_datasource
  vars:
    config_file: grafana_opensearch_ds.yml

- name: Restart Grafana service
  ansible.builtin.systemd_service:
    name: grafana-server
    enabled: true
    state: restarted
    daemon_reload: true
