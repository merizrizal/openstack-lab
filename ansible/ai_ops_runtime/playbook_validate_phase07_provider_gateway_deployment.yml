---
- name: Validate Phase 07 provider gateway deployment boundary
  hosts: assistant
  become: true
  gather_facts: false
  vars_files:
    - "{{ lookup('ansible.builtin.env', 'ROOT_DIR') | default(playbook_dir | dirname | dirname, true) }}/inventories/local/nodes.yml"
    - "{{ playbook_dir }}/roles/ai_client_runtime/defaults/main.yml"
  vars:
    ai_ops_provider_gateway_unit_path: >-
      /etc/systemd/system/{{ ai_ops_provider_gateway.service_name }}.service
    ai_ops_provider_gateway_ledger_directory: >-
      {{ ai_ops_provider_gateway.evidence_ledger | dirname }}
    ai_ops_provider_gateway_artifacts:
      - { path: "{{ ai_ops_provider_gateway.root }}", type: directory, owner: root, group: aiops-provider, mode: "0750" }
      - { path: "{{ ai_ops_provider_gateway.root }}/aiops_provider_gateway.py", type: file, owner: root, group: aiops-provider, mode: "0640" }
      - { path: "{{ ai_ops_provider_gateway.root }}/gateway_policy.json", type: file, owner: root, group: aiops-provider, mode: "0640" }
      - { path: "{{ ai_ops_provider_gateway.root }}/redaction.py", type: file, owner: root, group: aiops-provider, mode: "0640" }
      - { path: "{{ ai_ops_provider_gateway_unit_path }}", type: file, owner: root, group: root, mode: "0644" }
      - { path: "{{ ai_ops_provider_gateway_ledger_directory }}", type: directory, owner: aiops-provider, group: aiops-provider, mode: "0700" }
      - { path: "{{ ai_ops_provider_gateway.evidence_ledger }}", type: file, owner: aiops-provider, group: aiops-provider, mode: "0600" }
  tasks:
    - name: Assert provider gateway validation target is bounded
      ansible.builtin.assert:
        that:
          - inventory_hostname == 'assistant01'
          - ai_ops_provider_gateway.user == 'aiops-provider'
          - ai_ops_provider_gateway.group == 'aiops-provider'
          - ai_ops_provider_gateway.service_name == 'aiops-provider-gateway'
          - ai_ops_provider_gateway.evidence_ledger == '/var/lib/aiops-provider-gateway/gateway-evidence.jsonl'
        fail_msg: ERR_PROVIDER_GATEWAY_VALIDATION_SCOPE

    - name: Read provider gateway service state
      ansible.builtin.command:
        argv:
          - /usr/bin/systemctl
          - is-active
          - "{{ ai_ops_provider_gateway.service_name }}"
      register: ai_ops_provider_gateway_service_active
      changed_when: false
      no_log: true

    - name: Read provider gateway enablement state
      ansible.builtin.command:
        argv:
          - /usr/bin/systemctl
          - is-enabled
          - "{{ ai_ops_provider_gateway.service_name }}"
      register: ai_ops_provider_gateway_service_enabled
      changed_when: false
      no_log: true

    - name: Read provider gateway sandbox and environment
      ansible.builtin.command:
        argv:
          - /usr/bin/systemctl
          - show
          - "{{ ai_ops_provider_gateway.service_name }}"
          - --property=User
          - --property=Group
          - --property=RestrictAddressFamilies
          - --property=NoNewPrivileges
          - --property=PrivateTmp
          - --property=PrivateDevices
          - --property=ProtectSystem
          - --property=ProtectHome
          - --property=ReadWritePaths
          - --property=Environment
      register: ai_ops_provider_gateway_service_properties
      changed_when: false
      no_log: true

    - name: Read active TCP listeners
      ansible.builtin.command:
        argv: [/usr/bin/ss, -ltn]
      register: ai_ops_provider_gateway_listeners
      changed_when: false
      no_log: true

    - name: Inspect provider gateway deployment artifacts
      ansible.builtin.stat:
        path: "{{ item.path }}"
      loop: "{{ ai_ops_provider_gateway_artifacts }}"
      register: ai_ops_provider_gateway_artifact_stats
      changed_when: false

    - name: Assert provider gateway service boundary
      ansible.builtin.assert:
        that:
          - ai_ops_provider_gateway_service_active.stdout | trim == 'active'
          - ai_ops_provider_gateway_service_enabled.stdout | trim == 'enabled'
          - ai_ops_provider_gateway_service_properties.stdout is search('(?m)^User=aiops-provider$')
          - ai_ops_provider_gateway_service_properties.stdout is search('(?m)^Group=aiops-provider$')
          - ai_ops_provider_gateway_service_properties.stdout is search('(?m)^RestrictAddressFamilies=AF_INET$')
          - ai_ops_provider_gateway_service_properties.stdout is search('(?m)^NoNewPrivileges=yes$')
          - ai_ops_provider_gateway_service_properties.stdout is search('(?m)^PrivateTmp=yes$')
          - ai_ops_provider_gateway_service_properties.stdout is search('(?m)^PrivateDevices=yes$')
          - ai_ops_provider_gateway_service_properties.stdout is search('(?m)^ProtectSystem=strict$')
          - ai_ops_provider_gateway_service_properties.stdout is search('(?m)^ProtectHome=yes$')
          - ai_ops_provider_gateway_service_properties.stdout is search('(?m)^ReadWritePaths=/var/lib/aiops-provider-gateway$')
          - >-
            ai_ops_provider_gateway_service_properties.stdout is not search(
            '(?:^|\\s)(?:ALL_PROXY|HTTP_PROXY|HTTPS_PROXY|NO_PROXY|all_proxy|http_proxy|https_proxy|no_proxy)=')
          - ai_ops_provider_gateway_listeners.stdout is search('127.0.0.1:8765')
          - ai_ops_provider_gateway_listeners.stdout is not search('(?:0.0.0.0|\[::\]):8765')
        fail_msg: ERR_PROVIDER_GATEWAY_DEPLOYMENT_BOUNDARY
      no_log: true

    - name: Assert provider gateway artifact ownership and modes
      ansible.builtin.assert:
        that:
          - item.stat.exists
          - (item.item.type == 'directory') == item.stat.isdir
          - (item.item.type == 'file') == item.stat.isreg
          - item.stat.pw_name == item.item.owner
          - item.stat.gr_name == item.item.group
          - item.stat.mode == item.item.mode
          - not item.stat.islnk
        fail_msg: ERR_PROVIDER_GATEWAY_ARTIFACT_BOUNDARY
      loop: "{{ ai_ops_provider_gateway_artifact_stats.results }}"
      loop_control:
        label: "{{ item.item.path }}"
