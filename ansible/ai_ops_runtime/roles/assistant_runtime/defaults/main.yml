---
ai_ops_runtime_root: /opt/openstack-ai-ops
ai_ops_runtime_user: assistant
ai_ops_runtime_group: assistant
ai_ops_runtime_directory_mode: "0755"
ai_ops_runtime_credential_profiles_mode: "0700"
ai_ops_runtime_expect_empty_credentials: true
ai_ops_runtime_manage_openstack_profile: true
ai_ops_runtime_openstack_profile_name: aiops-project-reader
ai_ops_runtime_openstack_profile_source: "{{ root_dir }}/generated"
ai_ops_runtime_openstack_profile_source_is_remote: false
ai_ops_runtime_directories:
  - path: scripts/approved
  - path: diagnostics
  - path: diagnostics/raw
  - path: diagnostics/summaries
  - path: runbooks
  - path: credentials
  - path: credentials/profiles
    mode: "{{ ai_ops_runtime_credential_profiles_mode }}"
  - path: audit
  - path: mcp
ai_ops_runtime_packages:
  - python3
  - python3-venv
  - python3-pip
  - openssh-client
  - ripgrep
ai_ops_runtime_venv_path: "{{ ai_ops_runtime_root }}/.venv"
ai_ops_runtime_python_bootstrap_packages:
  - pip
  - setuptools
  - wheel
ai_ops_runtime_python_packages:
  - openstackclient
  - openstacksdk
