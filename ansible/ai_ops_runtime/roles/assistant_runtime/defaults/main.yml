---
ai_ops_runtime_root: /opt/openstack-ai-ops
ai_ops_runtime_user: assistant
ai_ops_runtime_group: assistant
ai_ops_runtime_directory_mode: "0755"
ai_ops_runtime_credential_profiles_mode: "0700"
ai_ops_runtime_expect_empty_credentials: true
ai_ops_runtime_manage_openstack_profile: true
ai_ops_runtime_openstack_profile_name: aiops-project-reader
ai_ops_runtime_openstack_profile_source: "{{ root_dir }}/generated"
ai_ops_runtime_openstack_profile_source_is_remote: false
ai_ops_runtime_directories:
  - path: scripts/approved
  - path: diagnostics
  - path: diagnostics/raw
  - path: diagnostics/summaries
  - path: runbooks
  - path: credentials
  - path: credentials/profiles
    mode: "{{ ai_ops_runtime_credential_profiles_mode }}"
  - path: audit
ai_ops_runtime_packages:
  - python3
  - python3-venv
  - python3-pip
  - openssh-client
  - ripgrep
ai_ops_runtime_venv_path: "{{ ai_ops_runtime_root }}/.venv"
ai_ops_runtime_mcp_root: "{{ ai_ops_runtime_root }}/mcp"
ai_ops_runtime_mcp_server_path: "{{ ai_ops_runtime_mcp_root }}/aiops_mcp_server.py"
ai_ops_runtime_mcp_policy_path: "{{ ai_ops_runtime_mcp_root }}/mcp_policy.json"
ai_ops_runtime_mcp_resources_path: "{{ ai_ops_runtime_mcp_root }}/resources"
ai_ops_runtime_mcp_python_package: "mcp==1.28.1"
ai_ops_runtime_mcp_state: present
ai_ops_runtime_mcp_removal_confirmed: false
ai_ops_runtime_mcp_remove_sdk: false
ai_ops_runtime_mcp_low_risk_tool_allowlist:
  - project_resource_summary
  - server_basic_info
  - server_network_info
ai_ops_runtime_mcp_restricted_host_tool_allowlist:
  - recent_metadata_errors
  - recent_nova_errors
  - recent_neutron_errors
ai_ops_runtime_mcp_restricted_host_exposure_enabled: false
ai_ops_runtime_python_bootstrap_packages:
  - pip
  - setuptools
  - wheel
ai_ops_runtime_python_packages:
  - openstackclient
  - openstacksdk
