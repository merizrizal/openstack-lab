---
- name: Ensure AI-OPS approved diagnostic script library directory exists
  ansible.builtin.file:
    path: "{{ ai_ops_runtime_root }}/scripts/approved/lib"
    state: directory
    owner: "{{ ai_ops_runtime_user }}"
    group: "{{ ai_ops_runtime_group }}"
    mode: "{{ ai_ops_runtime_directory_mode }}"

- name: Ensure AI-OPS tool runner directory exists
  ansible.builtin.file:
    path: "{{ ai_ops_runtime_root }}/scripts/tool_runner"
    state: directory
    owner: "{{ ai_ops_runtime_user }}"
    group: "{{ ai_ops_runtime_group }}"
    mode: "{{ ai_ops_runtime_directory_mode }}"

- name: Assert host diagnostic targets are reviewed observers
  ansible.builtin.assert:
    that:
      - "'controller01' in groups.get('ai_ops_host_observers', [])"
      - "'compute01' in groups.get('ai_ops_host_observers', [])"
      - "'compute02' in groups.get('ai_ops_host_observers', [])"
      - controller01.mgmtnet_ip_address is defined
      - compute01.mgmtnet_ip_address is defined
      - compute02.mgmtnet_ip_address is defined
    fail_msg: Host diagnostics require the reviewed controller and compute observer targets.

- name: Enforce root-owned AI-OPS script parent directory
  ansible.builtin.file:
    path: "{{ ai_ops_runtime_root }}/scripts"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Ensure root-managed host diagnostic directory exists
  ansible.builtin.file:
    path: "{{ ai_ops_runtime_root }}/scripts/host_diagnostics"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Install restricted host diagnostic connector
  ansible.builtin.copy:
    src: scripts/host_diagnostics/aiops_host_diagnostic_connector.py
    dest: "{{ ai_ops_runtime_root }}/scripts/host_diagnostics/aiops_host_diagnostic_connector.py"
    owner: root
    group: root
    mode: "0755"

- name: Render root-managed host diagnostic policy
  ansible.builtin.template:
    src: host_diagnostics/host_diagnostic_policy.json.j2
    dest: "{{ ai_ops_runtime_root }}/scripts/host_diagnostics/host_diagnostic_policy.json"
    owner: root
    group: root
    mode: "0644"

- name: Install AI-OPS tool runner CLI
  ansible.builtin.copy:
    src: scripts/tool_runner/aiops_tool_runner.py
    dest: "{{ ai_ops_runtime_root }}/scripts/tool_runner/aiops_tool_runner.py"
    owner: "{{ ai_ops_runtime_user }}"
    group: "{{ ai_ops_runtime_group }}"
    mode: "0755"

- name: Install AI-OPS tool runner registry
  ansible.builtin.copy:
    src: scripts/tool_runner/tool_registry.json
    dest: "{{ ai_ops_runtime_root }}/scripts/tool_runner/tool_registry.json"
    owner: "{{ ai_ops_runtime_user }}"
    group: "{{ ai_ops_runtime_group }}"
    mode: "0644"

- name: Install AI-OPS approved diagnostic policy README
  ansible.builtin.copy:
    src: scripts/approved/README.md
    dest: "{{ ai_ops_runtime_root }}/scripts/approved/README.md"
    owner: "{{ ai_ops_runtime_user }}"
    group: "{{ ai_ops_runtime_group }}"
    mode: "0644"

- name: Install AI-OPS approved diagnostic helper library
  ansible.builtin.copy:
    src: scripts/approved/lib/aiops_common.sh
    dest: "{{ ai_ops_runtime_root }}/scripts/approved/lib/aiops_common.sh"
    owner: "{{ ai_ops_runtime_user }}"
    group: "{{ ai_ops_runtime_group }}"
    mode: "0644"

- name: Install AI-OPS approved executable diagnostic scripts
  ansible.builtin.copy:
    src: "scripts/approved/{{ item }}"
    dest: "{{ ai_ops_runtime_root }}/scripts/approved/{{ item }}"
    owner: "{{ ai_ops_runtime_user }}"
    group: "{{ ai_ops_runtime_group }}"
    mode: "0755"
  loop:
    - project_resource_summary.sh
    - server_basic_info.sh
    - server_network_info.sh
    - neutron_agent_health.sh
