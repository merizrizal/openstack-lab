---
- name: Ensure OpenStack profile management has an explicit source path
  ansible.builtin.assert:
    that:
      - ai_ops_runtime_openstack_profile_source | length > 0
    fail_msg: "OpenStack profile management is enabled but ai_ops_runtime_openstack_profile_source is empty."
    success_msg: "OpenStack profile management received an explicit source path."

- name: Determine OpenStack profile source host
  ansible.builtin.set_fact:
    ai_ops_runtime_openstack_profile_source_host: "{{ ai_ops_runtime_openstack_profile_source_is_remote | bool | ternary(inventory_hostname, 'localhost') }}"

- name: Inspect OpenStack profile source directory
  ansible.builtin.stat:
    path: "{{ ai_ops_runtime_openstack_profile_source }}"
  become: false
  delegate_to: "{{ ai_ops_runtime_openstack_profile_source_host }}"
  register: ai_ops_runtime_openstack_profile_source_dir_stat

- name: Assert OpenStack profile source directory exists
  ansible.builtin.assert:
    that:
      - ai_ops_runtime_openstack_profile_source_dir_stat.stat.exists
      - ai_ops_runtime_openstack_profile_source_dir_stat.stat.isdir
    fail_msg: >-
      OpenStack profile source directory {{ ai_ops_runtime_openstack_profile_source }}
      was not found on {{ ai_ops_runtime_openstack_profile_source_host }}.
    success_msg: "OpenStack profile source directory exists."

- name: Inspect required OpenStack profile source files
  ansible.builtin.stat:
    path: "{{ ai_ops_runtime_openstack_profile_source }}/{{ item }}"
  loop:
    - clouds.yaml
    - secure.yaml
  become: false
  delegate_to: "{{ ai_ops_runtime_openstack_profile_source_host }}"
  register: ai_ops_runtime_openstack_profile_source_file_stats

- name: Assert required OpenStack profile source files exist
  ansible.builtin.assert:
    that:
      - item.stat.exists
      - item.stat.isreg
    fail_msg: >-
      Required OpenStack profile source file {{ item.item }} was not found in
      {{ ai_ops_runtime_openstack_profile_source }} on {{ ai_ops_runtime_openstack_profile_source_host }}.
    success_msg: "Required OpenStack profile source file exists."
  loop: "{{ ai_ops_runtime_openstack_profile_source_file_stats.results }}"

- name: Ensure OpenStack profile directory is protected
  ansible.builtin.file:
    path: "{{ ai_ops_runtime_root }}/credentials/profiles"
    state: directory
    owner: "{{ ai_ops_runtime_user }}"
    group: "{{ ai_ops_runtime_group }}"
    mode: "{{ ai_ops_runtime_credential_profiles_mode }}"

- name: Copy OpenStack profile clouds.yaml into runtime storage
  ansible.builtin.copy:
    src: "{{ ai_ops_runtime_openstack_profile_source }}/clouds.yaml"
    dest: "{{ ai_ops_runtime_root }}/credentials/profiles/clouds.yaml"
    owner: "{{ ai_ops_runtime_user }}"
    group: "{{ ai_ops_runtime_group }}"
    mode: "0600"
    remote_src: "{{ ai_ops_runtime_openstack_profile_source_is_remote | bool }}"
    backup: false
  no_log: true

- name: Copy OpenStack profile secure.yaml into runtime storage
  ansible.builtin.copy:
    src: "{{ ai_ops_runtime_openstack_profile_source }}/secure.yaml"
    dest: "{{ ai_ops_runtime_root }}/credentials/profiles/secure.yaml"
    owner: "{{ ai_ops_runtime_user }}"
    group: "{{ ai_ops_runtime_group }}"
    mode: "0600"
    remote_src: "{{ ai_ops_runtime_openstack_profile_source_is_remote | bool }}"
    backup: false
  no_log: true
