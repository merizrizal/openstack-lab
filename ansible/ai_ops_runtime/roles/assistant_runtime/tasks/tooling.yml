---
- name: Install baseline AI-OPS runtime packages
  ansible.builtin.package:
    name: "{{ ai_ops_runtime_packages }}"
    state: present

- name: Install Python packaging tools in AI-OPS runtime virtualenv
  ansible.builtin.pip:
    name: "{{ ai_ops_runtime_python_bootstrap_packages }}"
    state: present
    virtualenv: "{{ ai_ops_runtime_venv_path }}"
    virtualenv_command: python3 -m venv

- name: Install OpenStack Python tooling in AI-OPS runtime virtualenv
  ansible.builtin.pip:
    name: "{{ ai_ops_runtime_python_packages }}"
    state: present
    virtualenv: "{{ ai_ops_runtime_venv_path }}"
    virtualenv_command: python3 -m venv

- name: Install pinned MCP SDK in AI-OPS runtime virtualenv
  ansible.builtin.pip:
    name: "{{ ai_ops_runtime_mcp_python_package }}"
    state: present
    virtualenv: "{{ ai_ops_runtime_venv_path }}"
    virtualenv_command: python3 -m venv
