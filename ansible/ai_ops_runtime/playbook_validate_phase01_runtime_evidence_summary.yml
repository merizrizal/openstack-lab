---
- name: Validate AI-OPS Phase 01 runtime evidence summary
  hosts: assistant
  become: true
  gather_facts: true
  vars_files:
    - "{{ var_file_path }}"
    - "{{ playbook_dir }}/roles/assistant_runtime/defaults/main.yml"
  vars:
    ai_ops_runtime_evidence_path: "{{ ai_ops_runtime_root }}/diagnostics/summaries/phase01-runtime-evidence-{{ ansible_facts['date_time'].date }}.md"
    ai_ops_runtime_evidence_workspace_paths:
      - "{{ ai_ops_runtime_root }}"
      - "{{ ai_ops_runtime_root }}/scripts/approved"
      - "{{ ai_ops_runtime_root }}/diagnostics/raw"
      - "{{ ai_ops_runtime_root }}/diagnostics/summaries"
      - "{{ ai_ops_runtime_root }}/runbooks"
      - "{{ ai_ops_runtime_root }}/credentials/profiles"
      - "{{ ai_ops_runtime_root }}/audit"
      - "{{ ai_ops_runtime_root }}/mcp"
    ai_ops_runtime_evidence_commands:
      - label: Python 3
        argv:
          - python3
          - --version
      - label: Virtualenv Python
        argv:
          - "{{ ai_ops_runtime_venv_path }}/bin/python"
          - --version
      - label: Virtualenv pip
        argv:
          - "{{ ai_ops_runtime_venv_path }}/bin/python"
          - -m
          - pip
          - --version
      - label: OpenStack CLI
        argv:
          - "{{ ai_ops_runtime_venv_path }}/bin/openstack"
          - --version
      - label: OpenStack SDK import
        argv:
          - "{{ ai_ops_runtime_venv_path }}/bin/python"
          - -c
          - "import openstack; import openstack.version; print(openstack.version.__version__)"
      - label: SSH client
        argv:
          - ssh
          - -V
      - label: curl
        argv:
          - curl
          - --version
      - label: jq
        argv:
          - jq
          - --version
      - label: ripgrep
        argv:
          - rg
          - --version
      - label: Git
        argv:
          - git
          - --version
  tasks:
    - name: Collect AI-OPS runtime workspace path metadata
      ansible.builtin.stat:
        path: "{{ item }}"
      loop: "{{ ai_ops_runtime_evidence_workspace_paths }}"
      register: ai_ops_runtime_workspace_stats

    - name: Check Phase 01 credential profile directory for evidence
      ansible.builtin.find:
        paths: "{{ ai_ops_runtime_root }}/credentials/profiles"
        file_type: any
        hidden: true
        recurse: false
      register: ai_ops_runtime_evidence_credential_profiles

    - name: Capture AI-OPS runtime tool versions
      ansible.builtin.command:
        argv: "{{ item.argv }}"
      loop: "{{ ai_ops_runtime_evidence_commands }}"
      register: ai_ops_runtime_tool_version_results
      changed_when: false
      failed_when: false

    - name: Write AI-OPS runtime evidence summary
      ansible.builtin.copy:
        dest: "{{ ai_ops_runtime_evidence_path }}"
        owner: "{{ ai_ops_runtime_user }}"
        group: "{{ ai_ops_runtime_group }}"
        mode: "0644"
        content: |
          # Phase 01 Runtime Evidence Snapshot

          Generated by `ansible/ai_ops_runtime/playbook_setup_assistant_runtime.yml`.

          ## Metadata

          - Date: {{ ansible_facts['date_time'].iso8601 }}
          - Runtime host: {{ inventory_hostname }}
          - Workspace root: {{ ai_ops_runtime_root }}
          - Evidence path: {{ ai_ops_runtime_evidence_path }}
          - OpenStack auth configured by this playbook: no

          ## Workspace Checks

          {% for result in ai_ops_runtime_workspace_stats.results %}
          - {{ result.item }}: exists={{ result.stat.exists | default(false) }}, directory={{ result.stat.isdir | default(false) }}, owner={{ result.stat.pw_name | default('unknown') }}, group={{ result.stat.gr_name | default('unknown') }}, mode={{ result.stat.mode | default('unknown') }}
          {% endfor %}

          ## Credential Profile Directory

          - Path: {{ ai_ops_runtime_root }}/credentials/profiles
          - Entry count: {{ ai_ops_runtime_evidence_credential_profiles.matched }}
          - Expected Phase 01 state: empty

          ## Tooling Provenance

          - Bootstrap playbook roles: `common` then `assistant_runtime`.
          - Shared `common` role provides generic operator/runtime tools, including `curl`, `git`, and `jq`.
          - `assistant_runtime` role provides the AI-OPS workspace, OpenStack profile handling, runtime Python virtual environment, OpenStack CLI/SDK packages, SSH client package, and fast text search package.
          - Tool versions below are observed on {{ inventory_hostname }} at validation time and may differ from role defaults after later package or role updates.

          ## Tool Versions

          {% for result in ai_ops_runtime_tool_version_results.results %}
          ### {{ result.item.label }}

          - Return code: {{ result.rc }}
          - stdout:

            ```text
          {{ result.stdout | default('') | indent(6, true) }}
            ```

          - stderr:

            ```text
          {{ result.stderr | default('') | indent(6, true) }}
            ```

          {% endfor %}

          ## Boundary Notes

          - No OpenStack credential files are created by this playbook.
          - The `credentials/profiles/` directory must remain empty until Phase 02.
          - MCP remains inactive in Phase 01.
