---
- name: Validate AI-OPS Phase 04 tool runner safety gateway
  hosts: assistant
  become: true
  gather_facts: true
  vars_files:
    - "{{ lookup('ansible.builtin.env', 'ROOT_DIR') | default(playbook_dir | dirname | dirname, true) }}/inventories/local/nodes.yml"
    - "{{ playbook_dir }}/roles/assistant_runtime/defaults/main.yml"
  vars:
    ai_ops_phase04_tool_runner_dir: "{{ ai_ops_runtime_root }}/scripts/tool_runner"
    ai_ops_phase04_runner_path: "{{ ai_ops_phase04_tool_runner_dir }}/aiops_tool_runner.py"
    ai_ops_phase04_registry_path: "{{ ai_ops_phase04_tool_runner_dir }}/tool_registry.json"
    ai_ops_phase04_approved_script_dir: "{{ ai_ops_runtime_root }}/scripts/approved"
    ai_ops_phase04_audit_path: "{{ ai_ops_runtime_root }}/audit/tool-runner.jsonl"
    ai_ops_phase04_evidence_path: >-
      {{ ai_ops_runtime_root }}/diagnostics/summaries/phase04-tool-runner-safety-gateway-evidence-{{ ansible_facts['date_time'].date }}.md
    ai_ops_phase04_request_suffix: "{{ ansible_facts['date_time'].iso8601_basic_short }}Z"
    ai_ops_phase04_unknown_request_id: "phase04-denied-{{ ai_ops_phase04_request_suffix }}"
    ai_ops_phase04_invalid_request_id: "phase04-validation-error-{{ ai_ops_phase04_request_suffix }}"
    ai_ops_phase04_unavailable_request_id: "phase04-unavailable-{{ ai_ops_phase04_request_suffix }}"
    ai_ops_phase04_project_request_id: "phase04-project-summary-{{ ai_ops_phase04_request_suffix }}"
    ai_ops_phase04_invalid_identifier: "unsafe;identifier"
    ai_ops_phase04_required_paths:
      - label: tool runner directory
        path: "{{ ai_ops_phase04_tool_runner_dir }}"
        type: directory
        expected_mode: "0755"
      - label: tool runner CLI
        path: "{{ ai_ops_phase04_runner_path }}"
        type: file
        expected_mode: "0755"
      - label: tool runner registry
        path: "{{ ai_ops_phase04_registry_path }}"
        type: file
        expected_mode: "0644"
      - label: audit directory
        path: "{{ ai_ops_runtime_root }}/audit"
        type: directory
        expected_mode: "0755"
      - label: project resource summary approved script
        path: "{{ ai_ops_phase04_approved_script_dir }}/project_resource_summary.sh"
        type: file
        expected_mode: "0755"
      - label: server basic info approved script
        path: "{{ ai_ops_phase04_approved_script_dir }}/server_basic_info.sh"
        type: file
        expected_mode: "0755"
      - label: server network info approved script
        path: "{{ ai_ops_phase04_approved_script_dir }}/server_network_info.sh"
        type: file
        expected_mode: "0755"
      - label: neutron agent health approved script
        path: "{{ ai_ops_phase04_approved_script_dir }}/neutron_agent_health.sh"
        type: file
        expected_mode: "0755"
  tasks:
    - name: Inspect Phase 04 runtime paths
      ansible.builtin.stat:
        path: "{{ item.path }}"
      loop: "{{ ai_ops_phase04_required_paths }}"
      loop_control:
        label: "{{ item.label }}"
      register: ai_ops_phase04_required_path_stats

    - name: Assert Phase 04 tool runner paths are deployed
      ansible.builtin.assert:
        that:
          - >-
            ai_ops_phase04_required_path_stats.results
            | selectattr('stat.exists', 'equalto', false)
            | list
            | length == 0
          - >-
            ai_ops_phase04_required_path_stats.results
            | selectattr('item.type', 'equalto', 'directory')
            | rejectattr('stat.isdir')
            | list
            | length == 0
          - >-
            ai_ops_phase04_required_path_stats.results
            | selectattr('item.type', 'equalto', 'file')
            | rejectattr('stat.isreg')
            | list
            | length == 0
        fail_msg: "Phase 04 tool runner paths are missing or have unexpected types."
        success_msg: "Phase 04 tool runner paths are present."

    - name: Assert Phase 04 runtime path modes
      ansible.builtin.assert:
        that:
          - >-
            item.item.expected_mode is not defined
            or (item.stat.mode | string) in [item.item.expected_mode, item.item.expected_mode | regex_replace('^0', '')]
        fail_msg: >-
          {{ item.item.label }} has mode {{ item.stat.mode | default('unknown') }},
          expected {{ item.item.expected_mode | default('not-enforced') }}.
        success_msg: "{{ item.item.label }} has expected mode."
      loop: "{{ ai_ops_phase04_required_path_stats.results }}"
      loop_control:
        label: "{{ item.item.label }}"

    - name: Validate deployed Phase 04 registry JSON syntax
      ansible.builtin.command:
        argv:
          - python3
          - -m
          - json.tool
          - "{{ ai_ops_phase04_registry_path }}"
      register: ai_ops_phase04_registry_json_result
      changed_when: false
      failed_when: false

    - name: Assert deployed Phase 04 registry JSON parses
      ansible.builtin.assert:
        that:
          - ai_ops_phase04_registry_json_result.rc == 0
        fail_msg: "Phase 04 tool registry JSON did not parse."
        success_msg: "Phase 04 tool registry JSON parses."

    - name: Validate deployed Phase 04 runner Python syntax
      ansible.builtin.command:
        argv:
          - python3
          - -m
          - py_compile
          - "{{ ai_ops_phase04_runner_path }}"
      register: ai_ops_phase04_runner_py_compile_result
      changed_when: false
      failed_when: false

    - name: Assert deployed Phase 04 runner Python compiles
      ansible.builtin.assert:
        that:
          - ai_ops_phase04_runner_py_compile_result.rc == 0
        fail_msg: "Phase 04 tool runner Python did not compile."
        success_msg: "Phase 04 tool runner Python compiles."

    - name: Run Phase 04 unknown tool denial check
      ansible.builtin.command:
        argv:
          - "{{ ai_ops_phase04_runner_path }}"
          - --registry
          - "{{ ai_ops_phase04_registry_path }}"
          - --audit-path
          - "{{ ai_ops_phase04_audit_path }}"
          - --request-id
          - "{{ ai_ops_phase04_unknown_request_id }}"
          - unknown_runtime_validation_tool
      register: ai_ops_phase04_unknown_tool_result
      changed_when: false
      failed_when: false

    - name: Run Phase 04 unsafe parameter rejection check
      ansible.builtin.command:
        argv:
          - "{{ ai_ops_phase04_runner_path }}"
          - --registry
          - "{{ ai_ops_phase04_registry_path }}"
          - --audit-path
          - "{{ ai_ops_phase04_audit_path }}"
          - --request-id
          - "{{ ai_ops_phase04_invalid_request_id }}"
          - --arg
          - "server_identifier={{ ai_ops_phase04_invalid_identifier }}"
          - server_basic_info
      register: ai_ops_phase04_invalid_parameter_result
      changed_when: false
      failed_when: false

    - name: Run Phase 04 unavailable Neutron gate check
      ansible.builtin.command:
        argv:
          - "{{ ai_ops_phase04_runner_path }}"
          - --registry
          - "{{ ai_ops_phase04_registry_path }}"
          - --audit-path
          - "{{ ai_ops_phase04_audit_path }}"
          - --request-id
          - "{{ ai_ops_phase04_unavailable_request_id }}"
          - neutron_agent_health
      register: ai_ops_phase04_unavailable_tool_result
      changed_when: false
      failed_when: false

    - name: Run Phase 04 approved project summary smoke check
      ansible.builtin.command:
        argv:
          - "{{ ai_ops_phase04_runner_path }}"
          - --registry
          - "{{ ai_ops_phase04_registry_path }}"
          - --audit-path
          - "{{ ai_ops_phase04_audit_path }}"
          - --request-id
          - "{{ ai_ops_phase04_project_request_id }}"
          - project_resource_summary
      register: ai_ops_phase04_project_summary_result
      changed_when: false
      failed_when: false

    - name: Parse Phase 04 runner result envelopes
      ansible.builtin.set_fact:
        ai_ops_phase04_unknown_tool_envelope: "{{ ai_ops_phase04_unknown_tool_result.stdout | from_json }}"
        ai_ops_phase04_invalid_parameter_envelope: "{{ ai_ops_phase04_invalid_parameter_result.stdout | from_json }}"
        ai_ops_phase04_unavailable_tool_envelope: "{{ ai_ops_phase04_unavailable_tool_result.stdout | from_json }}"
        ai_ops_phase04_project_summary_envelope: "{{ ai_ops_phase04_project_summary_result.stdout | from_json }}"

    - name: Assert Phase 04 safety result statuses
      ansible.builtin.assert:
        that:
          - ai_ops_phase04_unknown_tool_result.rc != 0
          - ai_ops_phase04_unknown_tool_envelope.status == 'denied'
          - ai_ops_phase04_invalid_parameter_result.rc != 0
          - ai_ops_phase04_invalid_parameter_envelope.status == 'validation_error'
          - ai_ops_phase04_unavailable_tool_result.rc != 0
          - ai_ops_phase04_unavailable_tool_envelope.status == 'unavailable'
          - ai_ops_phase04_project_summary_envelope.tool == 'project_resource_summary'
          - ai_ops_phase04_project_summary_envelope.status in ['ok', 'error', 'truncated']
          - ai_ops_phase04_project_summary_envelope.status not in ['denied', 'validation_error', 'unavailable', 'timeout']
        fail_msg: "Phase 04 runner did not return the expected safety gateway statuses."
        success_msg: "Phase 04 runner returned expected denial, validation, unavailable, and approved-tool statuses."

    - name: Collect Phase 04 audit events for validation request IDs
      ansible.builtin.command:
        argv:
          - python3
          - -c
          - |
            import json
            import sys
            from pathlib import Path

            audit_path = Path(sys.argv[1])
            wanted = set(sys.argv[2:])
            found = {}
            with audit_path.open(encoding="utf-8") as handle:
                for line in handle:
                    if not line.strip():
                        continue
                    try:
                        event = json.loads(line)
                    except json.JSONDecodeError:
                        continue
                    request_id = event.get("request_id")
                    if request_id in wanted:
                        found[request_id] = {
                            "tool": event.get("tool"),
                            "status": event.get("status"),
                            "exit_code": event.get("exit_code"),
                        }
            missing = sorted(wanted - set(found))
            print(json.dumps(found, sort_keys=True))
            if missing:
                print(json.dumps({"missing": missing}, sort_keys=True), file=sys.stderr)
                sys.exit(1)
          - "{{ ai_ops_phase04_audit_path }}"
          - "{{ ai_ops_phase04_unknown_request_id }}"
          - "{{ ai_ops_phase04_invalid_request_id }}"
          - "{{ ai_ops_phase04_unavailable_request_id }}"
          - "{{ ai_ops_phase04_project_request_id }}"
      register: ai_ops_phase04_audit_event_summary_result
      changed_when: false
      failed_when: false

    - name: Parse Phase 04 audit event summary
      ansible.builtin.set_fact:
        ai_ops_phase04_audit_event_summary: "{{ ai_ops_phase04_audit_event_summary_result.stdout | from_json }}"

    - name: Assert Phase 04 audit events were written for all validation outcomes
      ansible.builtin.assert:
        that:
          - ai_ops_phase04_audit_event_summary_result.rc == 0
          - ai_ops_phase04_audit_event_summary[ai_ops_phase04_unknown_request_id].status == 'denied'
          - ai_ops_phase04_audit_event_summary[ai_ops_phase04_invalid_request_id].status == 'validation_error'
          - ai_ops_phase04_audit_event_summary[ai_ops_phase04_unavailable_request_id].status == 'unavailable'
          - ai_ops_phase04_audit_event_summary[ai_ops_phase04_project_request_id].status == ai_ops_phase04_project_summary_envelope.status
        fail_msg: "Phase 04 audit log does not contain expected sanitized validation events."
        success_msg: "Phase 04 audit log contains expected validation events."

    - name: Report Phase 04 tool runner validation statuses
      ansible.builtin.debug:
        msg:
          - "unknown tool status={{ ai_ops_phase04_unknown_tool_envelope.status }} rc={{ ai_ops_phase04_unknown_tool_result.rc }}"
          - "unsafe parameter status={{ ai_ops_phase04_invalid_parameter_envelope.status }} rc={{ ai_ops_phase04_invalid_parameter_result.rc }}"
          - "neutron unavailable status={{ ai_ops_phase04_unavailable_tool_envelope.status }} rc={{ ai_ops_phase04_unavailable_tool_result.rc }}"
          - "project summary status={{ ai_ops_phase04_project_summary_envelope.status }} rc={{ ai_ops_phase04_project_summary_result.rc }}"

    - name: Write AI-OPS Phase 04 tool runner safety gateway evidence summary
      ansible.builtin.copy:
        dest: "{{ ai_ops_phase04_evidence_path }}"
        owner: "{{ ai_ops_runtime_user }}"
        group: "{{ ai_ops_runtime_group }}"
        mode: "0644"
        content: |
          # Phase 04 Tool Runner Safety Gateway Evidence Snapshot

          Generated by `ansible/ai_ops_runtime/playbook_validate_phase04_tool_runner_safety_gateway.yml`.

          ## Metadata

          - Date: {{ ansible_facts['date_time'].iso8601 }}
          - Runtime host: {{ inventory_hostname }}
          - Workspace root: {{ ai_ops_runtime_root }}
          - Tool runner directory: {{ ai_ops_phase04_tool_runner_dir }}
          - Registry path: {{ ai_ops_phase04_registry_path }}
          - Audit path: {{ ai_ops_phase04_audit_path }}
          - Evidence path: {{ ai_ops_phase04_evidence_path }}

          ## Runtime Path Checks

          {% for result in ai_ops_phase04_required_path_stats.results %}
          - {{ result.item.label }}: {{ result.item.path }}
            - exists={{ result.stat.exists | default(false) }}
            - directory={{ result.stat.isdir | default(false) }}
            - file={{ result.stat.isreg | default(false) }}
            - owner={{ result.stat.pw_name | default('unknown') }}
            - group={{ result.stat.gr_name | default('unknown') }}
            - mode={{ result.stat.mode | default('unknown') }}
            - expected_mode={{ result.item.expected_mode | default('not-enforced') }}
          {% endfor %}

          ## Static Runtime Checks

          - Registry JSON parse return code: {{ ai_ops_phase04_registry_json_result.rc }}
          - Runner Python compile return code: {{ ai_ops_phase04_runner_py_compile_result.rc }}

          ## Runner Outcome Checks

          | Check | Request ID | Return Code | Status | Tool |
          | --- | --- | ---: | --- | --- |
          | Unknown tool denial | `{{ ai_ops_phase04_unknown_request_id }}` | {{ ai_ops_phase04_unknown_tool_result.rc }} | {{ ai_ops_phase04_unknown_tool_envelope.status }} | {{ ai_ops_phase04_unknown_tool_envelope.tool }} |
          | Unsafe parameter rejection | `{{ ai_ops_phase04_invalid_request_id }}` | {{ ai_ops_phase04_invalid_parameter_result.rc }} | {{ ai_ops_phase04_invalid_parameter_envelope.status }} | {{ ai_ops_phase04_invalid_parameter_envelope.tool }} |
          | Neutron unavailable gate | `{{ ai_ops_phase04_unavailable_request_id }}` | {{ ai_ops_phase04_unavailable_tool_result.rc }} | {{ ai_ops_phase04_unavailable_tool_envelope.status }} | {{ ai_ops_phase04_unavailable_tool_envelope.tool }} |
          | Approved project summary smoke | `{{ ai_ops_phase04_project_request_id }}` | {{ ai_ops_phase04_project_summary_result.rc }} | {{ ai_ops_phase04_project_summary_envelope.status }} | {{ ai_ops_phase04_project_summary_envelope.tool }} |

          ## Audit Event Summary

          {% for request_id, event in ai_ops_phase04_audit_event_summary.items() %}
          - `{{ request_id }}`: tool={{ event.tool }}, status={{ event.status }}, exit_code={{ event.exit_code | default('none') }}
          {% endfor %}

          ## Boundary Notes

          - This evidence summary records statuses and metadata only; it does not include credential file contents, tokens, passwords, private keys, or raw profile material.
          - Unknown tools must return `denied` and non-zero.
          - Unsafe server identifiers must return `validation_error` before approved scripts execute.
          - `neutron_agent_health` must remain `unavailable` until a validated non-default operator-reader profile exists.
          - The project summary smoke check validates an allowlisted runner path; OpenStack policy or service failures may still produce a structured `error` status without broadening capability.
