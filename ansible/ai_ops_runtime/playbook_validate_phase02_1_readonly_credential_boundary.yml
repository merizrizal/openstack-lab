---
- name: Validate AI-OPS Phase 02 read-only credential boundary
  hosts: assistant
  become: true
  gather_facts: true
  vars_files:
    - "{{ lookup('ansible.builtin.env', 'ROOT_DIR') | default(playbook_dir | dirname | dirname, true) }}/inventories/local/nodes.yml"
    - "{{ playbook_dir }}/roles/assistant_runtime/defaults/main.yml"
  vars:
    ai_ops_validation_profile_dir: "{{ ai_ops_runtime_root }}/credentials/profiles"
    ai_ops_validation_clouds_file: "{{ ai_ops_validation_profile_dir }}/clouds.yaml"
    ai_ops_validation_secure_file: "{{ ai_ops_validation_profile_dir }}/secure.yaml"
    ai_ops_validation_evidence_path: "{{ ai_ops_runtime_root }}/diagnostics/summaries/phase02-credential-boundary-evidence-{{ ansible_facts['date_time'].date }}.md"
    ai_ops_validation_env:
      OS_CLIENT_CONFIG_FILE: "{{ ai_ops_validation_clouds_file }}"
      OS_CLOUD: "{{ ai_ops_runtime_openstack_profile_name }}"
    ai_ops_validation_read_commands:
      - name: server list
        argv:
          - "{{ ai_ops_runtime_venv_path }}/bin/openstack"
          - server
          - list
          - -f
          - json
      - name: network list
        argv:
          - "{{ ai_ops_runtime_venv_path }}/bin/openstack"
          - network
          - list
          - -f
          - json
      - name: subnet list
        argv:
          - "{{ ai_ops_runtime_venv_path }}/bin/openstack"
          - subnet
          - list
          - -f
          - json
      - name: port list
        argv:
          - "{{ ai_ops_runtime_venv_path }}/bin/openstack"
          - port
          - list
          - -f
          - json
      - name: volume list
        argv:
          - "{{ ai_ops_runtime_venv_path }}/bin/openstack"
          - volume
          - list
          - -f
          - json
      - name: image list
        argv:
          - "{{ ai_ops_runtime_venv_path }}/bin/openstack"
          - image
          - list
          - -f
          - json
      - name: security group list
        argv:
          - "{{ ai_ops_runtime_venv_path }}/bin/openstack"
          - security
          - group
          - list
          - -f
          - json
  tasks:
    - name: Inspect Phase 02 credential profile paths
      ansible.builtin.stat:
        path: "{{ item }}"
      loop:
        - "{{ ai_ops_validation_profile_dir }}"
        - "{{ ai_ops_validation_clouds_file }}"
        - "{{ ai_ops_validation_secure_file }}"
      register: ai_ops_validation_profile_stats

    - name: Assert Phase 02 credential profile storage is present and protected
      ansible.builtin.assert:
        that:
          - ai_ops_validation_profile_stats.results[0].stat.exists
          - ai_ops_validation_profile_stats.results[0].stat.isdir
          - (ai_ops_validation_profile_stats.results[0].stat.mode | string) in ['0700', '700']
          - ai_ops_validation_profile_stats.results[1].stat.exists
          - ai_ops_validation_profile_stats.results[1].stat.isreg
          - (ai_ops_validation_profile_stats.results[1].stat.mode | string) in ['0600', '600']
          - ai_ops_validation_profile_stats.results[2].stat.exists
          - ai_ops_validation_profile_stats.results[2].stat.isreg
          - (ai_ops_validation_profile_stats.results[2].stat.mode | string) in ['0600', '600']
        fail_msg: >-
          Phase 02 credential storage is missing or not sufficiently protected under
          {{ ai_ops_validation_profile_dir }}.
        success_msg: "Phase 02 credential storage exists and is protected."

    - name: Issue token with the Phase 02 project-reader profile
      ansible.builtin.command:
        argv:
          - "{{ ai_ops_runtime_venv_path }}/bin/openstack"
          - token
          - issue
          - -f
          - json
      environment: "{{ ai_ops_validation_env }}"
      register: ai_ops_validation_token_issue
      changed_when: false
      failed_when: false
      no_log: true

    - name: Report token issuance result
      ansible.builtin.debug:
        msg: "token issue rc={{ ai_ops_validation_token_issue.rc }}"

    - name: Run Phase 02 project-visible read checks
      ansible.builtin.command:
        argv: "{{ item.argv }}"
      environment: "{{ ai_ops_validation_env }}"
      loop: "{{ ai_ops_validation_read_commands }}"
      loop_control:
        label: "{{ item.name }}"
      register: ai_ops_validation_read_results
      changed_when: false
      failed_when: false

    - name: Report Phase 02 read check results
      ansible.builtin.debug:
        msg: >-
          {{ item.item.name }} rc={{ item.rc }}
      loop: "{{ ai_ops_validation_read_results.results }}"
      loop_control:
        label: "{{ item.item.name }}"

    - name: Write AI-OPS Phase 02 credential boundary evidence summary
      ansible.builtin.copy:
        dest: "{{ ai_ops_validation_evidence_path }}"
        owner: "{{ ai_ops_runtime_user }}"
        group: "{{ ai_ops_runtime_group }}"
        mode: "0644"
        content: |
          # Phase 02 Credential Boundary Evidence Snapshot

          Generated by `ansible/ai_ops_runtime/playbook_validate_phase02_readonly_credential_boundary.yml`.

          ## Metadata

          - Date: {{ ansible_facts['date_time'].iso8601 }}
          - Runtime host: {{ inventory_hostname }}
          - Workspace root: {{ ai_ops_runtime_root }}
          - Evidence path: {{ ai_ops_validation_evidence_path }}
          - Profile name: {{ ai_ops_runtime_openstack_profile_name }}
          - OpenStack client config file: {{ ai_ops_validation_clouds_file }}

          ## Credential Profile Storage

          - {{ ai_ops_validation_profile_stats.results[0].item }}: exists={{ ai_ops_validation_profile_stats.results[0].stat.exists | default(false) }}, directory={{ ai_ops_validation_profile_stats.results[0].stat.isdir | default(false) }}, owner={{ ai_ops_validation_profile_stats.results[0].stat.pw_name | default('unknown') }}, group={{ ai_ops_validation_profile_stats.results[0].stat.gr_name | default('unknown') }}, mode={{ ai_ops_validation_profile_stats.results[0].stat.mode | default('unknown') }}
          - {{ ai_ops_validation_profile_stats.results[1].item }}: exists={{ ai_ops_validation_profile_stats.results[1].stat.exists | default(false) }}, file={{ ai_ops_validation_profile_stats.results[1].stat.isreg | default(false) }}, owner={{ ai_ops_validation_profile_stats.results[1].stat.pw_name | default('unknown') }}, group={{ ai_ops_validation_profile_stats.results[1].stat.gr_name | default('unknown') }}, mode={{ ai_ops_validation_profile_stats.results[1].stat.mode | default('unknown') }}
          - {{ ai_ops_validation_profile_stats.results[2].item }}: exists={{ ai_ops_validation_profile_stats.results[2].stat.exists | default(false) }}, file={{ ai_ops_validation_profile_stats.results[2].stat.isreg | default(false) }}, owner={{ ai_ops_validation_profile_stats.results[2].stat.pw_name | default('unknown') }}, group={{ ai_ops_validation_profile_stats.results[2].stat.gr_name | default('unknown') }}, mode={{ ai_ops_validation_profile_stats.results[2].stat.mode | default('unknown') }}

          ## Authentication Check

          - token issue return code: {{ ai_ops_validation_token_issue.rc }}
          - token output: omitted by design

          ## Project-Visible Read Checks

          {% for result in ai_ops_validation_read_results.results %}
          ### {{ result.item.name }}

          - Return code: {{ result.rc }}
          - stdout:

            ```text
          {{ result.stdout | default('') | indent(6, true) }}
            ```

          - stderr:

            ```text
          {{ result.stderr | default('') | indent(6, true) }}
            ```

          {% endfor %}

          ## Boundary Notes

          - Credential file content, token output, passwords, and private keys are not written by this evidence summary.
          - Mutation-denial evidence is intentionally handled separately.
