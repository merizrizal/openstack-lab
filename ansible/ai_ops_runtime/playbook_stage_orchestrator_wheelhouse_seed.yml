---
- name: Stage reviewed offline orchestrator wheel seed on localhost
  hosts: localhost
  connection: local
  become: true
  gather_facts: false
  vars:
    ai_ops_orchestrator_wheelhouse_seed_stage:
      enabled: false
      approval:
        id: ""
      staging_root: /tmp/openstack-ai-ops-wheelhouse-seed/orchestrator/.staging
      publication_root: /tmp/openstack-ai-ops-wheelhouse-seed/orchestrator
      index_url: https://pypi.org/simple
      target:
        python_version: "3.12"
        platform: manylinux_2_17_x86_64
        implementation: cp
        architecture: x86_64
    ai_ops_orchestrator_wheelhouse_seed_lock: "{{ playbook_dir }}/files/orchestrator/requirements.lock"
  tasks:
    - name: Assert localhost wheel seed staging contract
      ansible.builtin.assert:
        that:
          - ai_ops_orchestrator_wheelhouse_seed_stage is mapping
          - >-
            ai_ops_orchestrator_wheelhouse_seed_stage.keys() | list | sort ==
            ['approval', 'enabled', 'index_url', 'publication_root', 'staging_root', 'target']
          - ai_ops_orchestrator_wheelhouse_seed_stage.enabled | type_debug == 'bool'
          - ai_ops_orchestrator_wheelhouse_seed_stage.approval is mapping
          - ai_ops_orchestrator_wheelhouse_seed_stage.approval.keys() | list | sort == ['id']
          - >-
            ai_ops_orchestrator_wheelhouse_seed_stage.staging_root ==
            '/tmp/openstack-ai-ops-wheelhouse-seed/orchestrator/.staging'
          - >-
            ai_ops_orchestrator_wheelhouse_seed_stage.publication_root ==
            '/tmp/openstack-ai-ops-wheelhouse-seed/orchestrator'
          - ai_ops_orchestrator_wheelhouse_seed_stage.index_url == 'https://pypi.org/simple'
          - ai_ops_orchestrator_wheelhouse_seed_stage.target is mapping
          - >-
            ai_ops_orchestrator_wheelhouse_seed_stage.target.keys() | list | sort ==
            ['architecture', 'implementation', 'platform', 'python_version']
          - ai_ops_orchestrator_wheelhouse_seed_stage.target.python_version == '3.12'
          - ai_ops_orchestrator_wheelhouse_seed_stage.target.platform == 'manylinux_2_17_x86_64'
          - ai_ops_orchestrator_wheelhouse_seed_stage.target.implementation == 'cp'
          - ai_ops_orchestrator_wheelhouse_seed_stage.target.architecture == 'x86_64'
          - ai_ops_orchestrator_wheelhouse_seed_lock is file
        fail_msg: ERR_ORCHESTRATOR_WHEELHOUSE_SEED_STAGE_CONTRACT

    - name: Assert enabled localhost wheel seed approval
      ansible.builtin.assert:
        that:
          - ai_ops_orchestrator_wheelhouse_seed_stage.approval.id is match('^[A-Za-z0-9][A-Za-z0-9._-]{2,63}$')
        fail_msg: ERR_ORCHESTRATOR_WHEELHOUSE_SEED_STAGE_APPROVAL
      when: ai_ops_orchestrator_wheelhouse_seed_stage.enabled

    - name: Define approval-scoped localhost wheel seed paths
      ansible.builtin.set_fact:
        ai_ops_orchestrator_wheelhouse_seed_stage_path: >-
          {{ ai_ops_orchestrator_wheelhouse_seed_stage.staging_root }}/{{ ai_ops_orchestrator_wheelhouse_seed_stage.approval.id }}
        ai_ops_orchestrator_wheelhouse_seed_publication_path: >-
          {{ ai_ops_orchestrator_wheelhouse_seed_stage.publication_root }}/{{ ai_ops_orchestrator_wheelhouse_seed_stage.approval.id }}
      when: ai_ops_orchestrator_wheelhouse_seed_stage.enabled

    - name: Inspect immutable localhost wheel seed publication path
      ansible.builtin.stat:
        path: "{{ ai_ops_orchestrator_wheelhouse_seed_publication_path }}"
      register: ai_ops_orchestrator_wheelhouse_seed_publication_stat
      changed_when: false
      when: ai_ops_orchestrator_wheelhouse_seed_stage.enabled

    - name: Reject replacement of localhost wheel seed publication
      ansible.builtin.assert:
        that:
          - not ai_ops_orchestrator_wheelhouse_seed_publication_stat.stat.exists
        fail_msg: ERR_ORCHESTRATOR_WHEELHOUSE_SEED_STAGE_EXISTS
      when: ai_ops_orchestrator_wheelhouse_seed_stage.enabled

    - name: Download and verify approved localhost wheel seed
      when: ai_ops_orchestrator_wheelhouse_seed_stage.enabled
      block:
        - name: Create localhost wheel seed roots
          ansible.builtin.file:
            path: "{{ item.path }}"
            state: directory
            owner: root
            group: root
            mode: "{{ item.mode }}"
          loop:
            - { path: "{{ ai_ops_orchestrator_wheelhouse_seed_stage.publication_root }}", mode: "0750" }
            - { path: "{{ ai_ops_orchestrator_wheelhouse_seed_stage.staging_root }}", mode: "0700" }
            - { path: "{{ ai_ops_orchestrator_wheelhouse_seed_stage_path }}", mode: "0700" }
            - { path: "{{ ai_ops_orchestrator_wheelhouse_seed_stage_path }}/wheels", mode: "0700" }
            - { path: "{{ ai_ops_orchestrator_wheelhouse_seed_stage_path }}/verify", mode: "0700" }

        - name: Download hash-locked CPython 3.12 manylinux wheels to localhost staging
          ansible.builtin.command:
            argv:
              - "{{ ansible_playbook_python }}"
              - -m
              - pip
              - download
              - --index-url
              - https://pypi.org/simple
              - --require-hashes
              - --no-cache-dir
              - "--only-binary=:all:"
              - --platform
              - manylinux_2_17_x86_64
              - --python-version
              - "3.12"
              - --implementation
              - cp
              - --dest
              - "{{ ai_ops_orchestrator_wheelhouse_seed_stage_path }}/wheels"
              - -r
              - "{{ ai_ops_orchestrator_wheelhouse_seed_lock }}"
          changed_when: false
          no_log: true

        - name: Verify staged wheels against lock without package egress
          ansible.builtin.command:
            argv:
              - "{{ ansible_playbook_python }}"
              - -m
              - pip
              - download
              - --no-index
              - --require-hashes
              - --no-cache-dir
              - "--only-binary=:all:"
              - --platform
              - manylinux_2_17_x86_64
              - --python-version
              - "3.12"
              - --implementation
              - cp
              - --find-links
              - "{{ ai_ops_orchestrator_wheelhouse_seed_stage_path }}/wheels"
              - --dest
              - "{{ ai_ops_orchestrator_wheelhouse_seed_stage_path }}/verify"
              - -r
              - "{{ ai_ops_orchestrator_wheelhouse_seed_lock }}"
          changed_when: false
          no_log: true

        - name: Discover verified staged wheels
          ansible.builtin.find:
            paths: "{{ ai_ops_orchestrator_wheelhouse_seed_stage_path }}/wheels"
            patterns: "*.whl"
            file_type: file
            recurse: false
          register: ai_ops_orchestrator_wheelhouse_seed_wheels
          changed_when: false

        - name: Assert verified staged wheels exist
          ansible.builtin.assert:
            that:
              - ai_ops_orchestrator_wheelhouse_seed_wheels.matched | int > 0
            fail_msg: ERR_ORCHESTRATOR_WHEELHOUSE_SEED_STAGE_INTEGRITY

        - name: Seal verified staged wheels
          ansible.builtin.file:
            path: "{{ item.path }}"
            owner: root
            group: root
            mode: "0440"
          loop: "{{ ai_ops_orchestrator_wheelhouse_seed_wheels.files }}"

        - name: Remove local wheel verification output
          ansible.builtin.file:
            path: "{{ ai_ops_orchestrator_wheelhouse_seed_stage_path }}/verify"
            state: absent

        - name: Seal staged wheel seed directory
          ansible.builtin.file:
            path: "{{ ai_ops_orchestrator_wheelhouse_seed_stage_path }}/wheels"
            owner: root
            group: root
            mode: "0550"

        - name: Publish immutable localhost wheel seed atomically
          ansible.builtin.command:
            argv:
              - /usr/bin/mv
              - "{{ ai_ops_orchestrator_wheelhouse_seed_stage_path }}"
              - "{{ ai_ops_orchestrator_wheelhouse_seed_publication_path }}"
          changed_when: true

        - name: Seal published localhost wheel seed directory
          ansible.builtin.file:
            path: "{{ ai_ops_orchestrator_wheelhouse_seed_publication_path }}"
            owner: root
            group: root
            mode: "0550"
      always:
        - name: Remove incomplete localhost wheel seed staging path
          ansible.builtin.file:
            path: "{{ ai_ops_orchestrator_wheelhouse_seed_stage_path }}"
            state: absent
