---
- name: Deploy and setup OpenStack on controller node
  hosts: controller
  become: true
  vars_files:
    - "{{ var_file_path }}"
  roles:
    - role: controller
    - role: keystone
    - role: glance
    - role: placement
    - role: nova_controller
    - role: neutron_controller
    - role: horizon
    - role: cinder_controller
