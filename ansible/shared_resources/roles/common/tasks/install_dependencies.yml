---
- name: Install git-core repository
  ansible.builtin.include_role:
    name: common
    tasks_from: install_package_repository
  vars:
    repository_source_name: git-core
    repository_uri: https://ppa.launchpadcontent.net/git-core/ppa/ubuntu
    repository_key_uri: https://keyserver.ubuntu.com/pks/lookup?op=get&search=0xe363c90f8f1b6217
    repository_key_filename: git-core.asc
    repository_component: main

- name: Install packages dependencies
  ansible.builtin.package:
    name:
      - nano
      - wget
      - build-essential
      - chrony
      - curl
      - openssh-server
      - ca-certificates
      - tzdata
      - sshpass
      - git
      - zip
      - unzip
    state: present

- name: Install additional packages dependencies
  ansible.builtin.package:
    name: "{{ additional_packages }}"
    state: present
  when: additional_packages is defined and (additional_packages | length > 0)

- name: Set application list for installation
  ansible.builtin.set_fact:
    applications:
      - name: yq
        version: 4.53.3
        url: https://github.com/mikefarah/yq/releases/download/v#application_version#/yq_linux_amd64
        binary_files:
          - name: yq
            file: yq_linux_amd64

      - name: jq
        version: 1.8.2
        url: https://github.com/jqlang/jq/releases/download/jq-#application_version#/jq-linux-amd64
        binary_files:
          - name: jq
            file: jq-linux-amd64

      - name: nodejs
        version: 24.18.0
        url: https://nodejs.org/dist/v#application_version#/node-v#application_version#-linux-x64.tar.xz
        binary_files:
          - name: corepack
            file: bin/corepack

          - name: node
            file: bin/node

          - name: npm
            file: bin/npm

          - name: npx
            file: bin/npx
        is_archive: true

- name: Install applications
  ansible.builtin.include_tasks:
    file: install_application.yml
  loop: "{{ applications }}"
  loop_control:
    label: "{{ item.name }}"
