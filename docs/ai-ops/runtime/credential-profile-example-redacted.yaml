# Documentation-only example.
# Real files must remain runtime-local under /opt/openstack-ai-ops/credentials/profiles/.
# Do not paste secrets, tokens, or private keys into the repository.

# clouds.yaml
clouds:
  aiops-project-reader:
    region_name: <region-or-empty>
    interface: public
    identity_api_version: 3
    auth:
      auth_url: https://<keystone-host>:5000/v3
      auth_type: password
      username: <aiops-user>
      user_domain_name: Default
      project_name: <default-project-name>
      project_domain_name: Default

---

# secure.yaml
clouds:
  aiops-project-reader:
    auth:
      password: <redacted>

# Notes:
# - Application credentials are not supported in this lab at present.
# - The real password lives only on the assistant runtime in secure.yaml.
# - Keep both files mode 0600.
